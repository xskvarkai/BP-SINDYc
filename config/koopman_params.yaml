global:
  random_seed: 100

data_loading:
  file_name: Koopman_Aeroshield/Simulation
  state_column_indices: [0, 1]
  time_column_index: null
  time: 1.0e-2
  control_input_column_indices: [2]
  apply_savgol_filter: False
  savgol_window_length: 31
  savgol_polyorder: 2
  plot_data: False
  verbose: True

data_splitting:
  train_ratio: 0.9
  val_ratio: 0.1
  perturb_input_signal_ratio: False
  apply_savgol_filter: False
  filtered_set_names: [val, test]
  savgol_window_length: 31
  savgol_polyorder: 2
  plot_data: True
  verbose: True