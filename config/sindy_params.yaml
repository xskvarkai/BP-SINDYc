global:
  random_seed: 100

data_loading:
  file_name: Floatshield_with_deriv
  state_column_indices: [0, 1, 2]
  time_column_index: null
  time: 2.5e-2
  control_input_column_indices: [3]
  apply_savgol_filter: False
  savgol_window_length: 31
  savgol_polyorder: 2
  plot_data: False
  verbose: True

data_splitting:
  train_ratio: 0.6
  val_ratio: 0.2
  perturb_input_signal_ratio: null
  apply_savgol_filter: True
  filtered_set_names: [val, test]
  savgol_window_length: 31
  savgol_polyorder: 2
  plot_data: False
  verbose: True

data_preprocessing:
  num_samples_per_trajectory: 0.5 # Ratio of training data used for trajectories generation
  num_trajectories: 5

params_search:
  n_processes: 6
  log_file_name: Floatshield/worker_results
  export_file_name: Floatshield/Flaotshield

constraints:
  sim_steps: 880
  coeff_precision: null
  max_complexity: 50
  max_coeff: 4597
  min_r2: 0.1
  max_state: 400.0