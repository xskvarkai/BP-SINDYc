global:
  random_seed: 100

data_loading:
  file_name: Floatshield_with_deriv
  state_column_indices: [0, 1, 2, 3]
  time_column_index: null
  time: 2.5e-2
  control_input_column_indices: [4]
  apply_savgol_filter: False
  savgol_window_length: 31
  savgol_polyorder: 2
  plot_data: False
  verbose: True

data_splitting:
  train_ratio: 8800
  val_ratio: 2200
  perturb_input_signal_ratio: null
  apply_savgol_filter: True
  filtered_set_names: [val, test]
  savgol_window_length: 51
  savgol_polyorder: 2
  plot_data: True
  verbose: True

data_preprocessing:
  num_samples_per_trajectory: 0.5 # Ratio of training data used for trajectories generation
  num_trajectories: 12

params_search:
  n_processes: 8
  log_file_name: Floatshield/worker_results
  export_file_name: Floatshield/SINDyC_Floatshield
  timeout_per_config: 90

constraints:
  sim_steps: 2200
  coeff_precision: null
  max_complexity: 1000
  max_coeff: 100000
  min_r2: -20000
  max_state: 100000
  ksteps: 60